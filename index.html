<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BB Garage Webapp</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }
    .page {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    .panel, .preview-wrap {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    .panel { padding: 24px; }
    h1, h2, h3, p { margin: 0; }
    .title {
      display:flex; align-items:center; gap:10px; margin-bottom: 20px;
      font-size: 28px; font-weight: 800;
    }
    .muted { color:#64748b; }
    .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .grid-1 { display:grid; gap:12px; }
    label { display:block; font-size:14px; font-weight:700; margin-bottom:6px; }
    input, select, textarea {
      width:100%; border:1px solid #cbd5e1; border-radius:16px; padding:12px 14px;
      font-size:14px; background:#fff;
    }
    textarea { min-height: 110px; resize: vertical; }
    .section { margin-top: 18px; }
    .checkbox-row {
      display:flex; align-items:center; gap:10px; padding:12px 14px; border:1px solid #e2e8f0;
      border-radius:16px; background:#f8fafc; margin-top:16px;
    }
    .btn {
      border:0; border-radius:16px; padding:12px 16px; font-weight:700; cursor:pointer;
      background:#111827; color:#fff; font-size:14px;
    }
    .btn.secondary { background:#e2e8f0; color:#0f172a; }
    .btn.small { padding:8px 12px; border-radius:12px; }
    .row-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .line {
      border:1px solid #e2e8f0; border-radius:18px; padding:12px; margin-bottom:12px; background:#f8fafc;
    }
    .total-box {
      margin-top:16px; background:#111827; color:#fff; padding:16px; border-radius:18px;
    }
    .total-box .big { font-size:34px; font-weight:900; margin-top:4px; }
    .preview-wrap { padding:18px; overflow:auto; background:#d1d5db; }
    .preview {
      width:794px; min-height:1123px; background:#fff; margin:0 auto; padding:32px 40px; box-shadow:0 16px 40px rgba(0,0,0,.15);
    }
    .top {
      display:flex; justify-content:space-between; align-items:flex-start; gap:20px;
    }
    .vehicle-meta { font-size:18px; line-height:1.8; padding-top:12px; }
    .vehicle-meta b { font-weight:800; }
    .preview-title {
      margin-top:24px; border-bottom:3px solid #2563eb; padding-bottom:8px;
      font-size:34px; font-weight:900; text-transform:uppercase;
    }
    table { width:100%; border-collapse:collapse; margin-top:22px; font-size:15px; }
    th, td { border:1px solid #cbd5e1; padding:12px; }
    th { background:#f8fafc; text-align:left; }
    td.center, th.center { text-align:center; }
    .total-preview {
      width:270px; margin-left:auto; margin-top:18px; border:2px solid #2563eb; padding:14px; text-align:right;
    }
    .total-preview .small { font-size:13px; color:#1d4ed8; font-weight:800; text-transform:uppercase; }
    .total-preview .big { font-size:30px; font-weight:900; margin-top:4px; }
    .obs {
      margin-top:20px; border:2px solid #2563eb; padding:14px;
    }
    .obs .head { font-size:13px; color:#1d4ed8; font-weight:800; text-transform:uppercase; margin-bottom:8px; }
    .signatures {
      margin-top:60px; display:grid; grid-template-columns:1fr 1fr; gap:40px; font-size:15px;
    }
    .sig-line { margin-top:24px; border-bottom:1px solid #64748b; height:24px; }
    .logo-box { width:220px; flex:0 0 auto; }
    .badge {
      display:inline-block; padding:8px 14px; border-radius:999px; background:#111827; color:#fff; font-size:14px; font-weight:700;
    }
    .header-preview {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    @media (max-width: 1100px) {
      .page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="title">🔧 BB Garage Webapp v1</div>

      <div class="grid-1">
        <div>
          <label for="modele">Type de fiche</label>
          <select id="modele"></select>
        </div>
      </div>

      <div class="grid-2 section">
        <div style="grid-column:1 / -1">
          <label for="vehicule">Véhicule</label>
          <input id="vehicule" value="Citroën C4 Coupé VTS" />
        </div>
        <div>
          <label for="immatriculation">Immatriculation</label>
          <input id="immatriculation" value="GV-023-KN" />
        </div>
        <div>
          <label for="date">Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label for="kilometrage">Kilométrage</label>
          <input id="kilometrage" value="206000" />
        </div>
        <div>
          <label for="proprietaire">Propriétaire</label>
          <input id="proprietaire" />
        </div>
      </div>

      <div class="checkbox-row">
        <input id="afficherKilometrage" type="checkbox" checked />
        <label for="afficherKilometrage" style="margin:0">Afficher le kilométrage sur la fiche</label>
      </div>

      <div class="section">
        <div class="row-head">
          <label style="margin:0;font-size:16px;">Pièces / prestations</label>
          <button class="btn small" id="addLine">+ Ajouter</button>
        </div>
        <div id="lignesContainer"></div>
      </div>

      <div class="section">
        <label for="observations">Observations</label>
        <textarea id="observations">Intervention réalisée par le propriétaire du véhicule.</textarea>
      </div>

      <div class="total-box">
        <div style="font-size:14px;color:#cbd5e1;">Total estimé</div>
        <div class="big" id="totalBox">0,00 €</div>
      </div>

      <div class="section">
        <button class="btn" id="exportPdf" style="width:100%;">📄 Générer le PDF</button>
      </div>
    </div>

    <div>
      <div class="header-preview">
        <div>
          <h2 style="font-size:28px;font-weight:900;">Aperçu PDF</h2>
          <p class="muted">Version HTML autonome qui fonctionne directement dans le navigateur.</p>
        </div>
        <span class="badge">BB Garage</span>
      </div>

      <div class="preview-wrap">
        <div id="preview" class="preview">
          <div class="top">
            <div class="vehicle-meta">
              <div><b>Véhicule :</b> <span id="pvVehicule"></span></div>
              <div><b>Immatriculation :</b> <span id="pvPlaque"></span></div>
              <div id="pvKmRow"><b>Kilométrage :</b> <span id="pvKm"></span></div>
              <div><b>Date :</b> <span id="pvDate"></span></div>
            </div>

      { designation: "Disques", quantite: "", prix: "", total: "" },
      { designation: "Liquide de frein", quantite: "", prix: "", total: "" }
    ]
  },
  pneus: {
    label: "Remplacement pneus",
    lignes: [
      { designation: "Pneus avant", quantite: "", prix: "", total: "" },
      { designation: "Pneus arrière", quantite: "", prix: "", total: "" }
    ]
  },
  batterie: {
    label: "Remplacement batterie",
    lignes: [{ designation: "Batterie", quantite: "", prix: "", total: "" }]
  },
  embrayage: {
    label: "Remplacement embrayage",
    lignes: [
      { designation: "Kit embrayage", quantite: "", prix: "", total: "" },
      { designation: "Butée", quantite: "", prix: "", total: "" }
    ]
  },
  suspension: {
    label: "Réparation suspension",
    lignes: [
      { designation: "Amortisseurs avant", quantite: "", prix: "", total: "" },
      { designation: "Ressorts", quantite: "", prix: "", total: "" },
      { designation: "Coupelles", quantite: "", prix: "", total: "" }
    ]
  },
  egr: {
    label: "Nettoyage vanne EGR / admission",
    lignes: [
      { designation: "Nettoyage vanne EGR", quantite: "", prix: "", total: "" },
      { designation: "Nettoyage admission", quantite: "", prix: "", total: "" }
    ]
  },
  refroidissement: {
    label: "Remplacement liquide de refroidissement",
    lignes: [{ designation: "Liquide de refroidissement", quantite: "", prix: "", total: "" }]
  },
  ct: {
    label: "Contrôle technique",
    lignes: [
      { designation: "Contrôle technique", quantite: "", prix: "", total: "" },
      { designation: "Contre-visite", quantite: "", prix: "", total: "" }
    ]
  }
};

let lignes = JSON.parse(JSON.stringify(MODELES.amortisseurs.lignes));

const el = (id) => document.getElementById(id);

function formatEuro(value) {
  if (value === "" || value === null || value === undefined) return "";
  const cleaned = String(value).replace(/€/g, "").replace(/,/g, ".").trim();
  const num = Number(cleaned);
  if (Number.isNaN(num)) return String(value);
  return num.toFixed(2).replace(".", ",") + " €";
}

function parseAmount(value) {
  if (value === "" || value === null || value === undefined) return 0;
  const cleaned = String(value).replace(/€/g, "").replace(/,/g, ".").trim();
  const num = Number(cleaned);
  return Number.isNaN(num) ? 0 : num;
}

function getTotal() {
  return lignes.reduce((sum, l) => sum + parseAmount(l.total || l.prix), 0);
}

function renderModeleOptions() {
  const select = el("modele");
  Object.entries(MODELES).forEach(([key, value]) => {
    const option = document.createElement("option");
    option.value = key;
    option.textContent = value.label;
    select.appendChild(option);
  });
}

function renderLignes() {
  const container = el("lignesContainer");
  container.innerHTML = "";
  lignes.forEach((ligne, index) => {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = `
      <div class="grid-1">
        <div>
          <label>Désignation</label>
          <input data-index="${index}" data-field="designation" value="${ligne.designation || ""}">
        </div>
      </div>
      <div class="grid-2" style="grid-template-columns:1fr 1fr 1fr; margin-top:12px;">
        <div>
          <label>Qté</label>
          <input data-index="${index}" data-field="quantite" value="${ligne.quantite || ""}">
        </div>
        <div>
          <label>Prix</label>
          <input data-index="${index}" data-field="prix" value="${ligne.prix || ""}">
        </div>
        <div>
          <label>Total</label>
          <input data-index="${index}" data-field="total" value="${ligne.total || ""}">
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px;">
        <button class="btn secondary small" data-remove="${index}">Supprimer</button>
      </div>
    `;
    container.appendChild(div);
  });

  container.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", (e) => {
      const index = Number(e.target.dataset.index);
      const field = e.target.dataset.field;
      lignes[index][field] = e.target.value;
      renderPreview();
    });
  });

  container.querySelectorAll("[data-remove]").forEach(btn => {
    btn.addEventListener("click", () => {
      const index = Number(btn.dataset.remove);
      lignes.splice(index, 1);
      renderLignes();
      renderPreview();
    });
  });
}

function renderPreview() {
  el("pvVehicule").textContent = el("vehicule").value || "________________";
  el("pvPlaque").textContent = el("immatriculation").value || "________________";
  el("pvKm").textContent = el("kilometrage").value || "________________";
  el("pvDate").textContent = el("date").value || "________________";
  el("pvProprietaire").textContent = el("proprietaire").value || " ";
  el("pvObservations").textContent = el("observations").value || "________________";
  el("pvModele").textContent = MODELES[el("modele").value].label;
  el("pvKmRow").style.display = el("afficherKilometrage").checked ? "block" : "none";

  const tbody = el("previewBody");
  tbody.innerHTML = "";
  lignes.forEach(ligne => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${ligne.designation || "________________"}</td>
      <td class="center">${ligne.quantite || "__"}</td>
      <td class="center">${formatEuro(ligne.prix) || "____"}</td>
      <td class="center">${formatEuro(ligne.total || ligne.prix) || "____"}</td>
    `;
    tbody.appendChild(tr);
  });

  for (let i = lignes.length; i < 6; i++) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td style="height:46px;"></td><td></td><td></td><td></td>`;
    tbody.appendChild(tr);
  }

  const total = formatEuro(getTotal());
  el("totalBox").textContent = total;
  el("pvTotal").textContent = total;
}

function resetForModele() {
  lignes = JSON.parse(JSON.stringify(MODELES[el("modele").value].lignes));
  renderLignes();
  renderPreview();
}

async function exportPDF() {
  const preview = el("preview");
  const canvas = await html2canvas(preview, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
  const imgData = canvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");
  const pageWidth = 210;
  const imgWidth = pageWidth;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  pdf.addImage(imgData, "PNG", 0, 0, imgWidth, imgHeight);
  const modeleLabel = MODELES[el("modele").value].label.replace(/[^a-z0-9]+/gi, "_").toLowerCase();
  const plaque = (el("immatriculation").value || "fiche").replace(/[^a-z0-9-]+/gi, "_").toLowerCase();
  pdf.save(`${modeleLabel}_${plaque}.pdf`);
}

function bindFields() {
  ["vehicule", "immatriculation", "date", "kilometrage", "proprietaire", "observations", "afficherKilometrage"].forEach(id => {
    el(id).addEventListener("input", renderPreview);
    el(id).addEventListener("change", renderPreview);
  });

  el("modele").addEventListener("change", resetForModele);
  el("addLine").addEventListener("click", () => {
    lignes.push({ designation: "", quantite: "", prix: "", total: "" });
    renderLignes();
    renderPreview();
  });
  el("exportPdf").addEventListener("click", exportPDF);
}

function init() {
  el("date").value = new Date().toISOString().slice(0, 10);
  renderModeleOptions();
  el("modele").value = "amortisseurs";
  bindFields();
  renderLignes();
  renderPreview();
}

init();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>
